<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">WorkHere Korea sample life map</title>
  <desc id="desc">A static satellite-style sample map used in the WorkHere Korea life map MVP.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#314b35"/>
      <stop offset=".48" stop-color="#657c45"/>
      <stop offset="1" stop-color="#233a32"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dfb05b"/>
      <stop offset=".5" stop-color="#f1cd78"/>
      <stop offset="1" stop-color="#bf7e32"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#071421" flood-opacity=".35"/>
    </filter>
    <pattern id="parcel" width="120" height="90" patternUnits="userSpaceOnUse" patternTransform="rotate(-10)">
      <rect width="120" height="90" fill="rgba(255,255,255,0)"/>
      <path d="M0 0H120M0 45H120M60 0V90" stroke="#b9caa0" stroke-opacity=".22" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1600" height="980" fill="#21392f"/>
  <rect width="1600" height="980" fill="url(#field)"/>
  <rect width="1600" height="980" fill="url(#parcel)" opacity=".78"/>
  <path d="M-40 170 C220 110 380 90 610 150 C820 200 1010 170 1240 90 C1390 40 1510 50 1660 80" fill="none" stroke="#142d2b" stroke-width="74" opacity=".5"/>
  <path d="M-40 170 C220 110 380 90 610 150 C820 200 1010 170 1240 90 C1390 40 1510 50 1660 80" fill="none" stroke="url(#road)" stroke-width="42"/>
  <path d="M-40 170 C220 110 380 90 610 150 C820 200 1010 170 1240 90 C1390 40 1510 50 1660 80" fill="none" stroke="#3d2b1b" stroke-width="3" opacity=".45"/>
  <path d="M632 -40 C615 130 630 310 690 500 C735 645 750 785 710 1030" fill="none" stroke="#15282b" stroke-width="70" opacity=".55"/>
  <path d="M632 -40 C615 130 630 310 690 500 C735 645 750 785 710 1030" fill="none" stroke="#e6bd62" stroke-width="36"/>
  <path d="M-80 650 C210 670 420 660 615 620 C805 580 930 560 1110 690 C1280 812 1410 830 1690 760" fill="none" stroke="#182a2d" stroke-width="66" opacity=".6"/>
  <path d="M-80 650 C210 670 420 660 615 620 C805 580 930 560 1110 690 C1280 812 1410 830 1690 760" fill="none" stroke="#d7a44f" stroke-width="34"/>
  <path d="M470 250 C590 255 725 320 790 405 C860 496 990 555 1150 540" fill="none" stroke="#f4f8ff" stroke-opacity=".8" stroke-width="12"/>
  <path d="M910 280 C840 360 810 445 790 585 C770 720 730 820 660 930" fill="none" stroke="#f4f8ff" stroke-opacity=".78" stroke-width="10"/>
  <path d="M1070 240 C1000 395 960 520 980 700 C990 810 1030 890 1105 995" fill="none" stroke="#f4f8ff" stroke-opacity=".72" stroke-width="9"/>
  <g opacity=".72">
    <rect x="720" y="330" width="310" height="230" rx="8" fill="#34494a" stroke="#d7e2e0" stroke-opacity=".28"/>
    <path d="M748 350h250M748 390h250M748 430h250M748 470h250M748 510h250M780 345v200M830 345v200M890 345v200M950 345v200" stroke="#e8eeef" stroke-opacity=".18" stroke-width="3"/>
    <rect x="780" y="585" width="210" height="170" rx="8" fill="#455e57" stroke="#d7e2e0" stroke-opacity=".22"/>
    <path d="M800 610h170M800 650h170M800 690h170M835 600v145M895 600v145M950 600v145" stroke="#e8eeef" stroke-opacity=".17" stroke-width="3"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="18" y="16" width="392" height="50" rx="8" fill="#111827" opacity=".93"/>
    <text x="36" y="48" fill="#fff" font-family="Arial, sans-serif" font-size="19" font-weight="700">주변</text>
    <text x="104" y="48" fill="#e5eef8" font-family="Arial, sans-serif" font-size="18">충청북도 〉 청주시 청원구 〉 오창읍</text>
    <rect x="438" y="16" width="78" height="50" rx="8" fill="#17212f" opacity=".93"/>
    <text x="462" y="48" fill="#fff" font-family="Arial, sans-serif" font-size="18">28℃</text>
    <rect x="1320" y="16" width="84" height="50" rx="8" fill="#111827" opacity=".94"/>
    <text x="1344" y="48" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="700">지도</text>
    <rect x="1416" y="16" width="90" height="50" rx="8" fill="#2f80ed" opacity=".96"/>
    <text x="1436" y="48" fill="#fff" font-family="Arial, sans-serif" font-size="17" font-weight="700">스카이뷰</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#f8fafc" stroke="#06111d" stroke-width="4" paint-order="stroke">
    <text x="742" y="392">오창시장</text>
    <text x="842" y="505">청주 오창</text>
    <text x="965" y="615">오창중학교</text>
    <text x="566" y="368">청주터미널</text>
    <text x="1070" y="464">오창도서관</text>
    <text x="684" y="785">오창 과학단지</text>
    <text x="1114" y="210">주간보호센터</text>
  </g>
  <g filter="url(#softShadow)">
    <circle cx="860" cy="515" r="17" fill="#2f80ed" stroke="#fff" stroke-width="5"/>
    <circle cx="920" cy="570" r="14" fill="#e03b3b" stroke="#fff" stroke-width="4"/>
    <circle cx="785" cy="452" r="14" fill="#17a45b" stroke="#fff" stroke-width="4"/>
    <circle cx="1018" cy="485" r="14" fill="#8b5cf6" stroke="#fff" stroke-width="4"/>
    <circle cx="708" cy="612" r="14" fill="#f59e0b" stroke="#fff" stroke-width="4"/>
    <circle cx="1126" cy="540" r="14" fill="#fb7185" stroke="#fff" stroke-width="4"/>
  </g>
  <text x="1340" y="944" fill="#dbeafe" font-family="Arial, sans-serif" font-size="16" opacity=".75">WorkHere Korea sample map</text>
</svg>
